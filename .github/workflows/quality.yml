name: Code Quality Gate

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.11

      - name: Install tools
        run: |
          pip install black ruff flake8 bandit pip-audit

      # FORMAT
      - name: Black Format Check
        run: black .

      # LINT
      - name: Ruff Check
        run: ruff check . --fix

    #  - name: Flake8 Check
    #    run: flake8 src

      # SECURITY
      - name: Security Scan
        run: bandit -r src

      - name: Dependency Audit
        run: pip-audit