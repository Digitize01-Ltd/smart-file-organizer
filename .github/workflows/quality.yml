name: Code Quality Gate

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install tools
        run: |
          pip install black ruff flake8 bandit pip-audit

      # FORMAT
      - name: Black Format Check
        run: black --check .

      # LINT
      - name: Ruff Check
        run: ruff check .

      - name: Flake8 Check
        run: flake8 src

      # SECURITY
      - name: Security Scan
        run: bandit -r src

      - name: Dependency Audit
        run: pip-audit