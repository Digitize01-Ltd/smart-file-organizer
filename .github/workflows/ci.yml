name: CI - Test, Lint, Security, Build Validation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Debug (now this will show files)
      - name: Debug files
        run: ls -R

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install projects
        run: pip install -e .

      # -------------------------
      # FORMAT CHECK
      # -------------------------
      - name: Check formatting (Black)
        run: black .

      # -------------------------
      # LINTING
      # -------------------------
      - name: Ruff Linting
        run: ruff check . --fix

      - name: Flake8 Linting
        run: flake8 src

      # -------------------------
      # SECURITY SCAN
      # -------------------------
      - name: Bandit Security Scan
        run: bandit -r src

      - name: Dependency Vulnerability Scan
        run: pip-audit

      # -------------------------
      # TESTING
      # -------------------------
      - name: Run Tests
        run: pytest -v

      # -------------------------
      # IMPORT VALIDATION
      # -------------------------
      - name: Import Validation
        run: python -c "import src.sfo"

      # -------------------------
      # BUILD VALIDATION
      # -------------------------
      - name: Build Package
        run: python -m build